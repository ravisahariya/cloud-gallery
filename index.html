<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>
<style>
body { font-family: Arial; background:#222; color:white; text-align:center; }

#calc { width:300px; margin:30px auto; }
button { width:70px; height:50px; margin:5px; font-size:18px; }

#display { width:90%; height:40px; margin:10px; text-align:right; padding:5px; }

#vault { display:none; background:#f0f4f8; color:black; padding:15px; border-radius:10px; }

input, select { width:90%; margin:5px; padding:8px; }
</style>
</head>

<body>

<!-- Calculator -->
<div id="calc">
<h2>Calculator</h2>
<input id="display" disabled>

<br>
<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button><br>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button><br>

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button><br>

<button onclick="press('0')">0</button>
<button onclick="check()">=</button>
<button onclick="clearD()">C</button>
</div>

<!-- Vault -->
<div id="vault">
<h3>🔐 My Vault</h3>

<select id="category">
<option>Bank</option>
<option>ID</option>
<option>Apps</option>
<option>Email</option>
</select>

<input type="text" id="title" placeholder="Name">
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="save()">Save</button>
<button onclick="backup()">📤 Backup</button>
<input type="file" onchange="restore(event)">

<input type="text" id="search" placeholder="Search..." onkeyup="show()">

<ul id="list"></ul>
</div>

<script>
let secret = "1234"; // CHANGE PIN
let input = "";

let data = JSON.parse(localStorage.getItem("vault")) || [];
let editIndex = -1;

function press(n){
 input += n;
 document.getElementById("display").value = input;
}

function clearD(){
 input="";
 document.getElementById("display").value="";
}

function check(){
 if(input === secret){
  document.getElementById("calc").style.display="none";
  document.getElementById("vault").style.display="block";
  show();
 } else {
  try{
   document.getElementById("display").value = eval(input);
  }catch{
   alert("Error");
  }
 }
 input="";
}

function save(){
 let cat = category.value;
 let t = title.value;
 let u = username.value;
 let p = password.value;

 if(editIndex==-1){
  data.push({cat,t,u,p});
 } else {
  data[editIndex] = {cat,t,u,p};
  editIndex=-1;
 }

 localStorage.setItem("vault", JSON.stringify(data));
 clearFields();
 show();
}

function edit(i){
 let d = data[i];
 category.value = d.cat;
 title.value = d.t;
 username.value = d.u;
 password.value = d.p;
 editIndex = i;
}

function del(i){
 data.splice(i,1);
 localStorage.setItem("vault", JSON.stringify(data));
 show();
}

function show(){
 let list = document.getElementById("list");
 let s = search.value.toLowerCase();
 list.innerHTML="";

 data.forEach((d,i)=>{
  if(d.t.toLowerCase().includes(s)){
   list.innerHTML += `
   <li>
   <b>${d.t}</b> (${d.cat})<br>
   ${d.u}<br>
   🔒 ********<br>
   <button onclick="alert('${d.p}')">👁️</button>
   <button onclick="edit(${i})">✏️</button>
   <button onclick="del(${i})">❌</button>
   </li>`;
  }
 });
}

function clearFields(){
 title.value="";
 username.value="";
 password.value="";
}

function backup(){
 let blob = new Blob([JSON.stringify(data)], {type:"application/json"});
 let a = document.createElement("a");
 a.href = URL.createObjectURL(blob);
 a.download = "vault_backup.json";
 a.click();
}

function restore(e){
 let file = e.target.files[0];
 let reader = new FileReader();

 reader.onload = function(ev){
  data = JSON.parse(ev.target.result);
  localStorage.setItem("vault", JSON.stringify(data));
  show();
 };

 reader.readAsText(file);
}
</script>

</body>
</html>
