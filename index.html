<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Admin System</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
background:linear-gradient(120deg,#3a7bd5,#00d2ff);
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:25px;
width:320px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:6px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:10px;
margin-top:6px;
background:#3a7bd5;
color:white;
border:none;
border-radius:6px;
}

#dashboard,#admin,#register{
display:none;
}

table{
width:100%;
font-size:12px;
}

td{
border-bottom:1px solid #ccc;
padding:4px;
}

</style>

</head>

<body>



<div class="box" id="login">

<h2>Login</h2>

<input id="user" placeholder="User ID">

<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

<p>New User ? <a onclick="showRegister()">Register</a></p>

</div>



<div class="box" id="register">

<h2>Register</h2>

<input id="newuser" placeholder="User ID">

<input type="password" id="newpass" placeholder="Password">

<button onclick="registerUser()">Create Account</button>

<p><a onclick="showLogin()">Back Login</a></p>

</div>



<div class="box" id="dashboard">

<h2>User Dashboard</h2>

<input id="name" placeholder="Name">

<button onclick="markAttendance()">Mark Attendance</button>

<button onclick="logout()">Logout</button>

</div>



<div class="box" id="admin">

<h2>Admin Panel</h2>

<button onclick="download()">Download Attendance</button>

<button onclick="logout()">Logout</button>

<hr>

<table>

<tbody id="list"></tbody>

</table>

</div>



<script>

let users=JSON.parse(localStorage.getItem("users"))||[]

let attendance=JSON.parse(localStorage.getItem("attendance"))||[]



function login(){

let u=user.value
let p=pass.value

if(u=="admin" && p=="admin123"){

localStorage.setItem("session","admin")

showAdmin()

return

}

let found=users.find(x=>x.user==u && x.pass==p)

if(found){

localStorage.setItem("session",u)

showDashboard()

}else{

alert("Wrong Login")

}

}



function registerUser(){

users.push({

user:newuser.value,
pass:newpass.value

})

localStorage.setItem("users",JSON.stringify(users))

alert("User Created")

showLogin()

}



function showRegister(){

login.style.display="none"
register.style.display="block"

}



function showLogin(){

register.style.display="none"
login.style.display="block"

}



function showDashboard(){

login.style.display="none"
dashboard.style.display="block"

}



function showAdmin(){

login.style.display="none"
admin.style.display="block"

show()

}



function logout(){

localStorage.removeItem("session")

location.reload()

}



function markAttendance(){

let now=new Date()

attendance.push({

name:name.value,
date:now.toLocaleDateString(),
time:now.toLocaleTimeString()

})

localStorage.setItem("attendance",JSON.stringify(attendance))

alert("Attendance Marked")

}



function show(){

let html=""

attendance.forEach((x,i)=>{

html+=`

<tr>
<td>${x.name}</td>
<td>${x.date}</td>
<td>${x.time}</td>
</tr>

`

})

list.innerHTML=html

}



function download(){

let csv="Name,Date,Time\n"

attendance.forEach(x=>{

csv+=x.name+","+x.date+","+x.time+"\n"

})

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="attendance.csv"

a.click()

}



window.onload=function(){

let s=localStorage.getItem("session")

if(s=="admin"){

showAdmin()

}else if(s){

showDashboard()

}

}

</script>

</body>
</html>
