<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gate Pass</title>

<style>
body{
    font-family: Arial;
    background:#eaeaea;
    margin:0;
    text-align:center;
}

/* FORM BIG */
input, select{
    padding:12px;
    margin:6px;
    width:90%;
    max-width:400px;
    font-size:16px;
}

button{
    padding:10px 18px;
    margin:8px;
    font-size:15px;
    background:#800000;
    color:white;
    border:none;
}

/* PASS WRAPPER (holes ke liye) */
.wrapper{
    position:relative;
    width:95%;
    max-width:900px;
    margin:20px auto;
}

/* HOLES */
.hole{
    width:14px;
    height:14px;
    background:#eaeaea;
    border-radius:50%;
    position:absolute;
    left:-8px;
}

.hole.right{
    left:auto;
    right:-8px;
}

/* vertical holes */
.hole1{top:20px;}
.hole2{top:80px;}
.hole3{top:140px;}
.hole4{top:200px;}
.hole5{top:260px;}

.hole6{top:20px;}
.hole7{top:80px;}
.hole8{top:140px;}
.hole9{top:200px;}
.hole10{top:260px;}

/* PASS */
.pass{
    background:white;
    border:2px solid #800000;
    padding:15px;
    text-align:left;
}

/* HEADER */
.header{
    border-bottom:2px solid #800000;
    margin-bottom:5px;
}

.title{
    font-size:22px;
    font-weight:bold;
    color:#800000;
}

/* ROW */
.row{
    display:flex;
    justify-content:space-between;
}

.left,.right{
    width:48%;
    font-size:15px;
    line-height:1.6;
}

/* SIGN */
.sign{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
}

/* MOBILE */
@media(max-width:600px){
.row{flex-direction:column;}
.left,.right{width:100%;}
}
</style>

</head>

<body>

<h2>Gate Pass Entry</h2>

<input type="date" id="date"><br>
<input id="transporter" placeholder="Transporter"><br>
<input id="from" placeholder="From"><br>
<input id="driver" placeholder="Driver Name"><br>
<input id="vehicle" placeholder="Vehicle No"><br>

<input id="goods" placeholder="Goods Type"><br>
<input id="dept" placeholder="Department"><br>
<input id="personMeet" placeholder="Person Meet"><br>

<select id="dvr"><option>DVR</option><option>1</option><option>0</option></select>
<select id="ldr"><option>LDR</option><option>1</option><option>0</option></select>
<select id="clr"><option>CLR</option><option>1</option><option>0</option></select>
<select id="oep"><option>OEP</option><option>1</option><option>0</option></select><br>

<input id="person" placeholder="Total Person"><br>

<select id="type">
<option>External</option>
<option>Internal</option>
</select><br>

<button onclick="save()">Save</button>

<hr>

<div id="list"></div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

let entryNo = localStorage.getItem("entryNo") || 2604118000;
let dataList = JSON.parse(localStorage.getItem("dataList")) || [];

function save(){
entryNo++;
localStorage.setItem("entryNo", entryNo);

let d={
id:Date.now(),
date:date.value,
transporter:transporter.value,
from:from.value,
driver:driver.value,
vehicle:vehicle.value,
goods:goods.value,
dept:dept.value,
personMeet:personMeet.value,
dvr:dvr.value,
ldr:ldr.value,
clr:clr.value,
oep:oep.value,
person:person.value,
type:type.value,
time:new Date().toLocaleTimeString(),
entryNo:entryNo
};

dataList.push(d);
localStorage.setItem("dataList",JSON.stringify(dataList));

clearForm();
show();
}

function clearForm(){
document.querySelectorAll("input").forEach(i=>i.value="");
document.querySelectorAll("select").forEach(s=>s.selectedIndex=0);
}

function show(){
let html="";
dataList.forEach(d=>{

html+=`
<div class="wrapper" id="pass${d.id}">

<!-- LEFT HOLES -->
<div class="hole hole1"></div>
<div class="hole hole2"></div>
<div class="hole hole3"></div>
<div class="hole hole4"></div>
<div class="hole hole5"></div>

<!-- RIGHT HOLES -->
<div class="hole right hole6"></div>
<div class="hole right hole7"></div>
<div class="hole right hole8"></div>
<div class="hole right hole9"></div>
<div class="hole right hole10"></div>

<div class="pass">

<div class="header">
<div class="title">Arvind Limited</div>
</div>

<div class="row">
<div class="left">
<b>Vehicle Entry Pass</b><br>
Date: ${d.date}<br>
Transporter: ${d.transporter}<br>
From: ${d.from}<br>
Driver Name: ${d.driver}<br>
Vehicle No: ${d.vehicle}<br>
Goods Type: ${d.goods}<br>
Department: ${d.dept}<br>
Person Meet: ${d.personMeet}
</div>

<div class="right">
Vehicle Entry No: ${d.entryNo}<br>
In Time: ${d.time}<br>
Veh Ent Type: ${d.type}<br>
DVR: ${d.dvr}<br>
LDR: ${d.ldr}<br>
CLR: ${d.clr}<br>
OEP: ${d.oep}<br>
Total Person: ${d.person}
</div>
</div>

<div class="sign">
<div>Sign (Transporter)</div>
<div>Sign (Authority)</div>
</div>

<button onclick="downloadImage('pass${d.id}')">Download</button>
<button onclick="edit(${d.id})">Edit</button>

</div>
</div>
`;
});
list.innerHTML=html;
}

function downloadImage(id){
html2canvas(document.getElementById(id)).then(canvas=>{
let link=document.createElement("a");
link.download="gatepass.png";
link.href=canvas.toDataURL();
link.click();
});
}

function edit(id){
let d=dataList.find(x=>x.id==id);

date.value=d.date;
transporter.value=d.transporter;
from.value=d.from;
driver.value=d.driver;
vehicle.value=d.vehicle;
goods.value=d.goods;
dept.value=d.dept;
personMeet.value=d.personMeet;
dvr.value=d.dvr;
ldr.value=d.ldr;
clr.value=d.clr;
oep.value=d.oep;
person.value=d.person;
type.value=d.type;

dataList=dataList.filter(x=>x.id!=id);
localStorage.setItem("dataList",JSON.stringify(dataList));
show();
}

show();

</script>

</body>
</html>
