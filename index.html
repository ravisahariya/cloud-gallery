<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gate Pass System</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    text-align: center;
}

input, select {
    padding: 8px;
    margin: 5px;
    width: 230px;
}

button {
    padding: 8px 15px;
    margin: 5px;
}

/* PASS DESIGN */
.pass {
    width: 95%;
    max-width: 900px;
    margin: 10px auto;
    background: white;
    border: 3px double #000;
    padding: 15px;
    text-align: left;
}

.title {
    font-size: 20px;
    font-weight: bold;
}

.row {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

.left, .right {
    width: 48%;
    font-size: 14px;
    line-height: 1.6;
}

.sign {
    display: flex;
    justify-content: space-between;
    margin-top: 25px;
}

@media print {
    body * { visibility: hidden; }
    .printable, .printable * { visibility: visible; }
}
</style>

</head>

<body>

<h3>Gate Pass Entry Form</h3>

<input id="date" placeholder="Date"><br>
<input id="transporter" placeholder="Transporter"><br>
<input id="from" placeholder="From"><br>
<input id="driver" placeholder="Driver Name"><br>
<input id="vehicle" placeholder="Vehicle No"><br>

<input id="goods" placeholder="Goods Type"><br>
<input id="dept" placeholder="Department"><br>
<input id="personMeet" placeholder="Person Meet"><br>

<select id="dvr"><option>DVR</option><option>1</option><option>0</option></select>
<select id="ldr"><option>LDR</option><option>1</option><option>0</option></select>
<select id="clr"><option>CLR</option><option>1</option><option>0</option></select>
<select id="oep"><option>OEP</option><option>1</option><option>0</option></select><br>

<input id="person" placeholder="Total Person"><br>

<select id="type">
<option>External</option>
<option>Internal</option>
</select><br>

<button onclick="save()">Save</button>

<hr>

<div id="list"></div>

<script>

let entryNo = localStorage.getItem("entryNo") || 2604118000;
let dataList = JSON.parse(localStorage.getItem("dataList")) || [];

function save(){
entryNo++;
localStorage.setItem("entryNo", entryNo);

let data = {
id: Date.now(),
date: date.value,
transporter: transporter.value,
from: from.value,
driver: driver.value,
vehicle: vehicle.value,
goods: goods.value,
dept: dept.value,
personMeet: personMeet.value,
dvr: dvr.value,
ldr: ldr.value,
clr: clr.value,
oep: oep.value,
person: person.value,
type: type.value,
time: new Date().toLocaleTimeString(),
entryNo: entryNo
};

dataList.push(data);
localStorage.setItem("dataList", JSON.stringify(dataList));

clearForm();
show();
}

function clearForm(){
document.querySelectorAll("input").forEach(i=>i.value="");
document.querySelectorAll("select").forEach(s=>s.selectedIndex=0);
}

function show(){
let html = "";

dataList.forEach(d => {

html += `
<div class="pass printable">

<div class="title">Arvind Limited</div>

<div class="row">
<div class="left">
<b>Date:</b> ${d.date}<br>
<b>Transporter:</b> ${d.transporter}<br>
<b>From:</b> ${d.from}<br>
<b>Driver:</b> ${d.driver}<br>
<b>Vehicle No:</b> ${d.vehicle}<br>
<b>Goods Type:</b> ${d.goods}<br>
<b>Department:</b> ${d.dept}<br>
<b>Person Meet:</b> ${d.personMeet}
</div>

<div class="right">
<b>Vehicle Entry No:</b> ${d.entryNo}<br>
<b>In Time:</b> ${d.time}<br>
<b>Veh Ent Type:</b> ${d.type}<br>
<b>DVR:</b> ${d.dvr}<br>
<b>LDR:</b> ${d.ldr}<br>
<b>CLR:</b> ${d.clr}<br>
<b>OEP:</b> ${d.oep}<br>
<b>Total Person:</b> ${d.person}
</div>
</div>

<div class="sign">
<div>Sign (Transporter)</div>
<div>Sign (Authority)</div>
</div>

<button onclick="edit(${d.id})">Edit</button>
<button onclick="download(this)">Download</button>

</div>
`;
});

document.getElementById("list").innerHTML = html;
}

function edit(id){
let d = dataList.find(x=>x.id==id);

date.value = d.date;
transporter.value = d.transporter;
from.value = d.from;
driver.value = d.driver;
vehicle.value = d.vehicle;
goods.value = d.goods;
dept.value = d.dept;
personMeet.value = d.personMeet;
dvr.value = d.dvr;
ldr.value = d.ldr;
clr.value = d.clr;
oep.value = d.oep;
person.value = d.person;
type.value = d.type;

dataList = dataList.filter(x=>x.id!=id);
localStorage.setItem("dataList", JSON.stringify(dataList));
show();
}

function download(btn){
let content = btn.parentElement.innerHTML;
let w = window.open("");
w.document.write(content);
w.print();
}

show();

</script>

</body>
</html>
