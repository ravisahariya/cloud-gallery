<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "YOUR_ID",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveData = async function(){

let title=document.getElementById("title").value
let password=document.getElementById("password").value
let note=document.getElementById("note").value

await addDoc(collection(db,"vault"),{
title:title,
password:password,
note:note
})

alert("Saved Online")

}

window.showData = async function(){

let querySnapshot = await getDocs(collection(db,"vault"))

let html=""

querySnapshot.forEach((doc)=>{
let data=doc.data()

html += "<h3>"+data.title+"</h3>"
html += "<p>"+data.password+"</p>"
html += "<p>"+data.note+"</p><hr>"

})

document.getElementById("result").innerHTML=html

}

</script>
