<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ravi Secure App</title>

<!-- Firebase (compat version) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
text-align:center;
}

.box{
background:rgba(255,255,255,0.1);
padding:20px;
margin:50px auto;
width:300px;
border-radius:15px;
}

input,textarea{
width:90%;
padding:10px;
margin:5px;
}

button{
padding:10px;
margin:5px;
width:90%;
background:#00c6ff;
border:none;
color:white;
border-radius:10px;
}

#dashboard{display:none;}
</style>
</head>

<body>

<div class="box" id="loginBox">
<h2>Login / Register</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="forgot()">Forgot Password</button>
</div>

<div class="box" id="dashboard">
<h2>My Data</h2>

<textarea id="data" rows="5" placeholder="Apna data yahan likho"></textarea><br>

<button onclick="save()">Save</button>
<button onclick="logout()">Logout</button>

<p id="msg"></p>
</div>

<script>

// 🔥 YOUR FIREBASE CONFIG (already added)
const firebaseConfig = {
  apiKey: "AIzaSyBjBnmYvtdJGmKovVn9VB5vFXaG7vHedN0",
  authDomain: "project-7422c593-fd12-4d96-847.firebaseapp.com",
  projectId: "project-7422c593-fd12-4d96-847",
  storageBucket: "project-7422c593-fd12-4d96-847.firebasestorage.app",
  messagingSenderId: "541255136170",
  appId: "1:541255136170:web:59af7e084897394153f1d3",
  measurementId: "G-CRZ9MW1E95"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// Register
function register(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.then(()=>alert("Registered Successfully"))
.catch(e=>alert(e.message));
}

// Login
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>{
loginBox.style.display="none";
dashboard.style.display="block";
load();
})
.catch(e=>alert(e.message));
}

// Forgot password
function forgot(){
auth.sendPasswordResetEmail(email.value)
.then(()=>alert("Reset email bhej diya"))
.catch(e=>alert(e.message));
}

// Save data
function save(){
let user=auth.currentUser;
db.collection("users").doc(user.uid).set({
data:data.value
});
msg.innerText="Saved!";
}

// Load data
function load(){
let user=auth.currentUser;

db.collection("users").doc(user.uid).get()
.then(doc=>{
if(doc.exists){
data.value=doc.data().data;
}
});
}

// Logout
function logout(){
auth.signOut();
location.reload();
}

</script>

</body>
</html>
