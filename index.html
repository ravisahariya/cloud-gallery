<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Attendance System</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#3a7bd5,#00d2ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:20px;
width:320px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:100%;
padding:8px;
margin:6px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:6px;
background:#3a7bd5;
color:white;
border:none;
border-radius:5px;
}

#admin,#user{
display:none;
}

table{
width:100%;
font-size:12px;
}

td{
border-bottom:1px solid #ccc;
}

</style>

</head>


<body>


<div class="box" id="login">

<h3>Login</h3>

<input id="userId" placeholder="User ID">

<input type="password" id="pass">

<button onclick="login()">Login</button>

</div>



<div class="box" id="user">

<h3>Mark Attendance</h3>

<input id="name" placeholder="Name">

<button onclick="mark()">Mark Attendance</button>

<button onclick="logout()">Logout</button>

</div>



<div class="box" id="admin">

<h3>Admin Panel</h3>

<button onclick="download()">Download Attendance</button>

<button onclick="logout()">Logout</button>

<hr>

<table>

<tbody id="list"></tbody>

</table>

</div>



<script>

let attendance=JSON.parse(localStorage.getItem("attendance"))||[]

function login(){

let u=userId.value
let p=pass.value

if(u=="admin" && p=="admin123"){

login.style.display="none"
admin.style.display="block"

show()

}else{

login.style.display="none"
user.style.display="block"

}

}



function logout(){

location.reload()

}



function mark(){

let now=new Date()

let obj={

name:name.value,
date:now.toLocaleDateString(),
time:now.toLocaleTimeString()

}

attendance.push(obj)

localStorage.setItem("attendance",JSON.stringify(attendance))

alert("Attendance Marked")

}



function show(){

let html=""

attendance.forEach((x,i)=>{

html+=`
<tr>
<td>${x.name}</td>
<td>${x.date}</td>
<td>${x.time}</td>
<td><button onclick="del(${i})">X</button></td>
</tr>
`

})

list.innerHTML=html

}



function del(i){

attendance.splice(i,1)

localStorage.setItem("attendance",JSON.stringify(attendance))

show()

}



function download(){

let csv="Name,Date,Time\n"

attendance.forEach(x=>{

csv+=x.name+","+x.date+","+x.time+"\n"

})

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="attendance.csv"

a.click()

}

</script>

</body>
</html>
