<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

/* HEADER */
.header{
background:#2c3e50;
color:white;
padding:12px;
text-align:center;
font-size:18px;
}

/* FORM */
.box{
padding:10px;
}

input,select,button{
width:100%;
padding:12px;
margin:6px 0;
border-radius:8px;
border:1px solid #ccc;
}

/* CARD */
.card{
background:white;
border-radius:12px;
padding:12px;
margin:10px 0;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

/* BUTTON ROW */
.row{
display:flex;
gap:5px;
}

.row button{
flex:1;
}

/* PASSWORD TEXT */
.pass{
color:#888;
letter-spacing:2px;
}
</style>
</head>

<body>

<div class="header">📂 My Secure Vault</div>

<div class="box">

<button onclick="logout()">🚪 Logout</button>

<select id="category">
<option>Bank</option>
<option>ID</option>
<option>Apps</option>
<option>Email</option>
</select>

<input id="title" placeholder="Name">
<input id="username" placeholder="Username">
<input id="password" placeholder="Password">

<button onclick="save()">💾 Save</button>

<input id="search" placeholder="🔍 Search..." onkeyup="show()">

<div id="list"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("vault")) || [];
let editIndex = -1;

/* SAVE */
function save(){
if(title.value=="") return alert("Enter Name");

let obj = {
t:title.value,
u:username.value,
p:password.value,
c:category.value
};

if(editIndex==-1){
data.push(obj);
}else{
data[editIndex]=obj;
editIndex=-1;
}

localStorage.setItem("vault",JSON.stringify(data));

title.value="";
username.value="";
password.value="";

show();
}

/* SHOW */
function show(){
list.innerHTML="";
let s = search.value.toLowerCase();

data.forEach((d,i)=>{
if((d.t||"").toLowerCase().includes(s)){

list.innerHTML+=`
<div class="card">
<b>${d.t}</b> (${d.c})<br>
${d.u}<br>

<div class="pass" id="p${i}">🔒 ******</div>

<div class="row">
<button onclick="toggle(${i})">👁️</button>
<button onclick="edit(${i})">✏️</button>
<button onclick="del(${i})">❌</button>
</div>
</div>
`;
}
});
}

/* SHOW PASSWORD */
function toggle(i){
let el=document.getElementById("p"+i);
if(el.innerText.includes("*")){
el.innerText=data[i].p;
}else{
el.innerText="🔒 ******";
}
}

/* EDIT */
function edit(i){
let d=data[i];
title.value=d.t;
username.value=d.u;
password.value=d.p;
category.value=d.c;
editIndex=i;
}

/* DELETE */
function del(i){
data.splice(i,1);
localStorage.setItem("vault",JSON.stringify(data));
show();
}

/* LOGOUT */
function logout(){
localStorage.removeItem("login");
location.reload();
}

show();
</script>

</body>
</html>
