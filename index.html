<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Secure Login</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
background:linear-gradient(120deg,#3a7bd5,#00d2ff);
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:25px;
width:300px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:6px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:8px;
background:#3a7bd5;
color:white;
border:none;
border-radius:5px;
}

#home,#register,#admin{
display:none;
}

</style>

</head>


<body>


<div class="box" id="loginBox">

<h3>Login</h3>

<input id="user" placeholder="User ID">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

<p>New User ? <a onclick="showRegister()">Register</a></p>

<p><a onclick="forgot()">Forgot Password</a></p>

</div>



<div class="box" id="registerBox">

<h3>Create Account</h3>

<input id="newuser" placeholder="User ID">
<input type="password" id="newpass" placeholder="Password">

<button onclick="register()">Register</button>

<p><a onclick="showLogin()">Back Login</a></p>

</div>



<div class="box" id="home">

<h3>Dashboard</h3>

<p>Login Success</p>

<button onclick="logout()">Logout</button>

</div>



<div class="box" id="admin">

<h3>Admin Panel</h3>

<button onclick="showUsers()">All Users</button>

<div id="list"></div>

<button onclick="logout()">Logout</button>

</div>



<script>

let users = JSON.parse(localStorage.getItem("users")) || [];



function register(){

let u=newuser.value
let p=newpass.value

if(!u || !p){

alert("Fill All Fields")
return

}

let exist=users.find(x=>x.user==u)

if(exist){

alert("User Already Exists")
return

}

users.push({user:u,pass:p})

localStorage.setItem("users",JSON.stringify(users))

alert("Account Created")

showLogin()

}



function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value


if(u=="admin" && p=="admin123"){

localStorage.setItem("session","admin")

showAdmin()

return

}


let found=users.find(x=>x.user==u && x.pass==p)

if(found){

localStorage.setItem("session",u)

showHome()

}else{

alert("Wrong Login")

}

}



function logout(){

localStorage.removeItem("session")

location.reload()

}



function forgot(){

let u=prompt("Enter User ID")

let found=users.find(x=>x.user==u)

if(found){

alert("Password : "+found.pass)

}else{

alert("User Not Found")

}

}



function showRegister(){

loginBox.style.display="none"
registerBox.style.display="block"

}



function showLogin(){

registerBox.style.display="none"
loginBox.style.display="block"

}



function showHome(){

loginBox.style.display="none"
registerBox.style.display="none"
home.style.display="block"

}



function showAdmin(){

loginBox.style.display="none"
admin.style.display="block"

}



function showUsers(){

let html=""

users.forEach(x=>{

html+=x.user+"<br>"

})

list.innerHTML=html

}



window.onload=function(){

let s=localStorage.getItem("session")

if(s=="admin"){

showAdmin()

}else if(s){

showHome()

}

}

</script>

</body>
</html>
