<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>

<style>
body { margin:0; font-family:Arial; }

/* CENTER LOGIN */
#loginBox{
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 background:#222;
}

.login{
 background:white;
 padding:30px;
 border-radius:15px;
 width:300px;
 text-align:center;
}

input,select,button{
 width:100%;
 padding:12px;
 margin:6px 0;
 border-radius:8px;
 border:1px solid #ccc;
}

/* CALCULATOR */
#calc{
 display:none;
 height:100vh;
 background:#222;
 color:white;
 text-align:center;
}

#display{
 width:90%;
 height:50px;
 margin:10px;
 text-align:right;
 font-size:20px;
}

button.calcBtn{
 width:80px;
 height:60px;
 margin:5px;
 font-size:18px;
}

/* VAULT */
#vault{
 display:none;
 padding:15px;
 background:#f2f5f8;
 min-height:100vh;
}

.card{
 background:white;
 padding:10px;
 border-radius:10px;
 margin:10px 0;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
 <div class="login">
  <h3>🔐 Login / Register</h3>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
 </div>
</div>

<!-- CALCULATOR -->
<div id="calc">
 <h2>Calculator</h2>
 <input id="display" disabled>

 <br>
 <button class="calcBtn" onclick="press('1')">1</button>
 <button class="calcBtn" onclick="press('2')">2</button>
 <button class="calcBtn" onclick="press('3')">3</button><br>

 <button class="calcBtn" onclick="press('4')">4</button>
 <button class="calcBtn" onclick="press('5')">5</button>
 <button class="calcBtn" onclick="press('6')">6</button><br>

 <button class="calcBtn" onclick="press('7')">7</button>
 <button class="calcBtn" onclick="press('8')">8</button>
 <button class="calcBtn" onclick="press('9')">9</button><br>

 <button class="calcBtn" onclick="press('0')">0</button>
 <button class="calcBtn" onclick="check()">=</button>
 <button class="calcBtn" onclick="clearD()">C</button>
</div>

<!-- VAULT -->
<div id="vault">
<h3>📂 My Vault</h3>

<button onclick="logout()">🚪 Logout</button>

<select id="category">
<option>Bank</option>
<option>ID</option>
<option>Apps</option>
<option>Email</option>
</select>

<input id="title" placeholder="Name">
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="save()">Save</button>

<input id="search" placeholder="Search..." onkeyup="show()">

<ul id="list"></ul>
</div>

<script>
let input="";
let secret="1234";

let data = JSON.parse(localStorage.getItem("vault"))||[];

/* LOGIN SYSTEM */
function register(){
 localStorage.setItem("user", user.value);
 localStorage.setItem("pass", pass.value);
 alert("Registered");
}

function login(){
 if(user.value==localStorage.getItem("user") &&
    pass.value==localStorage.getItem("pass")){
  localStorage.setItem("login","yes");
  showCalc();
 } else alert("Wrong");
}

function showCalc(){
 loginBox.style.display="none";
 calc.style.display="block";
}

if(localStorage.getItem("login")=="yes"){
 showCalc();
}

/* CALC */
function press(n){
 input+=n;
 display.value=input;
}

function clearD(){
 input="";
 display.value="";
}

function check(){
 if(input===secret){
  calc.style.display="none";
  vault.style.display="block";
  show();
 } else {
  try{ display.value=eval(input); }catch{}
 }
 input="";
}

/* VAULT */
function save(){
 data.push({
  t:title.value,
  u:username.value,
  p:password.value,
  c:category.value
 });
 localStorage.setItem("vault",JSON.stringify(data));
 show();
}

function show(){
 list.innerHTML="";
 let s=search.value.toLowerCase();

 data.forEach((d,i)=>{
  if(d.t.toLowerCase().includes(s)){
   list.innerHTML+=`
   <div class="card">
   <b>${d.t}</b> (${d.c})<br>
   ${d.u}<br>
   🔒 ******<br>
   <button onclick="alert('${d.p}')">👁️</button>
   <button onclick="del(${i})">❌</button>
   </div>`;
  }
 });
}

function del(i){
 data.splice(i,1);
 localStorage.setItem("vault",JSON.stringify(data));
 show();
}

/* LOGOUT */
function logout(){
 localStorage.removeItem("login");
 location.reload();
}
</script>

</body>
</html>
