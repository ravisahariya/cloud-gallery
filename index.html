<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Secure Login</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
background:linear-gradient(120deg,#3a7bd5,#00d2ff);
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:25px;
width:300px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:12px;
margin:6px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#3a7bd5;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

a{
font-size:14px;
cursor:pointer;
}

#registerBox,#home{
display:none;
}

</style>

</head>

<body>



<div class="box" id="loginBox">

<h2>Login</h2>

<input id="loginUser" placeholder="User ID">

<input type="password" id="loginPass" placeholder="Password">

<button onclick="login()">Login</button>

<p>New User ? <a onclick="showRegister()">Register</a></p>

<p><a onclick="forgot()">Forgot Password</a></p>

</div>



<div class="box" id="registerBox">

<h2>Register</h2>

<input id="regUser" placeholder="User ID">

<input type="password" id="regPass" placeholder="Password">

<button onclick="register()">Create Account</button>

<p><a onclick="showLogin()">Back Login</a></p>

</div>



<div class="box" id="home">

<h2>Dashboard</h2>

<p>Login Success</p>

<button onclick="logout()">Logout</button>

</div>



<script>

let users = JSON.parse(localStorage.getItem("users")) || []


function register(){

let u=regUser.value
let p=regPass.value

if(!u || !p){

alert("Fill all fields")
return

}

let exist=users.find(x=>x.user==u)

if(exist){

alert("User already exists")
return

}

users.push({user:u,pass:p})

localStorage.setItem("users",JSON.stringify(users))

alert("Registration Success")

showLogin()

}



function login(){

let u=loginUser.value
let p=loginPass.value

if(u=="admin" && p=="admin123"){

localStorage.setItem("session","admin")

showHome()

return

}

let found=users.find(x=>x.user==u && x.pass==p)

if(found){

localStorage.setItem("session",u)

showHome()

}else{

alert("Wrong ID or Password")

}

}



function logout(){

localStorage.removeItem("session")

location.reload()

}



function forgot(){

let u=prompt("Enter User ID")

let found=users.find(x=>x.user==u)

if(found){

alert("Password : "+found.pass)

}else{

alert("User not found")

}

}



function showRegister(){

loginBox.style.display="none"
registerBox.style.display="block"

}
